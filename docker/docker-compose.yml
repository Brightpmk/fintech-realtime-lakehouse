name: fintech-realtime-lakehouse

x-aws-env: &aws-env
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-admin}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-password}
  AWS_REGION: ${AWS_REGION:-us-east-1}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}

services:
  kafka:
    image: confluentinc/cp-kafka:8.2.1
    container_name: fintech-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093,2@kafka2:29093,3@kafka3:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s
    networks:
      - fintech_network

  kafka2:
    image: confluentinc/cp-kafka:8.2.1
    container_name: fintech-kafka2
    hostname: kafka2
    ports:
      - "9093:9093"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093,2@kafka2:29093,3@kafka3:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:29092,PLAINTEXT_HOST://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka2_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9093 >/dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s
    networks:
      - fintech_network

  kafka3:
    image: confluentinc/cp-kafka:8.2.1
    container_name: fintech-kafka3
    hostname: kafka3
    ports:
      - "9094:9094"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093,2@kafka2:29093,3@kafka3:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka3:29092,PLAINTEXT_HOST://localhost:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka3_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9094 >/dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s
    networks:
      - fintech_network

  schema-registry:
    image: confluentinc/cp-schema-registry:8.2.1
    container_name: fintech-schema-registry
    hostname: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092,PLAINTEXT://kafka2:29092,PLAINTEXT://kafka3:29092
      SCHEMA_REGISTRY_SCHEMA_REGISTRY_INTER_INSTANCE_PROTOCOL: http
      SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL: INFO
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - fintech_network

  flink-jobmanager:
    build:
      context: .
      dockerfile: flink/Dockerfile
    image: fintech-flink-py:1.20.4
    container_name: fintech-flink-jobmanager
    hostname: flink-jobmanager
    command: jobmanager
    depends_on:
      kafka:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      iceberg-rest:
        condition: service_healthy
    ports:
      - "8082:8081"
    environment:
      <<: *aws-env
      FLINK_CHECKPOINT_DIR: s3://warehouse/flink-checkpoints/kafka-to-iceberg
      FLINK_CHECKPOINT_INTERVAL_MS: 300000
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092,kafka2:29092,kafka3:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      ICEBERG_REST_URI: http://iceberg-rest:8181
      S3_ENDPOINT: http://minio:9000
      PII_HASH_SALT: ${PII_HASH_SALT:-local-dev-pii-salt-change-me}
      FLINK_PIPELINE_JARS: ${FLINK_PIPELINE_JARS:-}
      FLINK_JARS_DIR: /opt/flink/usrlib
      PYFLINK_CLIENT_EXECUTABLE: python3
      PYFLINK_PYTHON: python3
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.bind-address: 0.0.0.0
        rest.address: flink-jobmanager
        parallelism.default: 2
        state.backend.type: rocksdb
        classloader.parent-first-patterns.additional: com.codahale.metrics.
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
    volumes:
      - ../tmp/jars:/opt/flink/usrlib:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/jobs > /dev/null"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: on-failure
    networks:
      - fintech_network

  flink-taskmanager:
    build:
      context: .
      dockerfile: flink/Dockerfile
    image: fintech-flink-py:1.20.4
    container_name: fintech-flink-taskmanager
    hostname: flink-taskmanager
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      <<: *aws-env
      FLINK_CHECKPOINT_DIR: s3://warehouse/flink-checkpoints/kafka-to-iceberg
      FLINK_CHECKPOINT_INTERVAL_MS: 300000
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092,kafka2:29092,kafka3:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      ICEBERG_REST_URI: http://iceberg-rest:8181
      S3_ENDPOINT: http://minio:9000
      PII_HASH_SALT: ${PII_HASH_SALT:-local-dev-pii-salt-change-me}
      FLINK_PIPELINE_JARS: ${FLINK_PIPELINE_JARS:-}
      FLINK_JARS_DIR: /opt/flink/usrlib
      PYFLINK_CLIENT_EXECUTABLE: python3
      PYFLINK_PYTHON: python3
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
        classloader.parent-first-patterns.additional: com.codahale.metrics.
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
    volumes:
      - ../tmp/jars:/opt/flink/usrlib:ro
    restart: on-failure
    networks:
      - fintech_network

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: fintech-minio
    hostname: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-admin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-password}
      MINIO_REGION_NAME: ${AWS_REGION:-us-east-1}
      MINIO_DOMAIN: minio
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      fintech_network:
        aliases:
          - warehouse.minio

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: fintech-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      <<: *aws-env
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 $$AWS_ACCESS_KEY_ID $$AWS_SECRET_ACCESS_KEY && mc mb --ignore-existing local/warehouse && mc anonymous set none local/warehouse "
    networks:
      - fintech_network

  iceberg-catalog-db:
    image: postgres:16-alpine
    container_name: fintech-iceberg-catalog-db
    hostname: iceberg-catalog-db
    environment:
      POSTGRES_DB: ${ICEBERG_CATALOG_DB_NAME:-iceberg}
      POSTGRES_USER: ${ICEBERG_CATALOG_DB_USER:-iceberg}
      POSTGRES_PASSWORD: ${ICEBERG_CATALOG_DB_PASSWORD:-iceberg}
    volumes:
      - iceberg_catalog_db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - fintech_network

  iceberg-rest:
    build:
      context: .
      dockerfile: iceberg-rest/Dockerfile
    image: fintech-iceberg-rest:1.10.1-postgres
    container_name: fintech-iceberg-rest
    hostname: iceberg-rest
    depends_on:
      iceberg-catalog-db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8181:8181"
    environment:
      <<: *aws-env
      CATALOG_URI: jdbc:postgresql://iceberg-catalog-db:5432/${ICEBERG_CATALOG_DB_NAME:-iceberg}
      CATALOG_JDBC_USER: ${ICEBERG_CATALOG_DB_USER:-iceberg}
      CATALOG_JDBC_PASSWORD: ${ICEBERG_CATALOG_DB_PASSWORD:-iceberg}
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      CATALOG_S3_ACCESS__KEY__ID: ${AWS_ACCESS_KEY_ID:-admin}
      CATALOG_S3_SECRET__ACCESS__KEY: ${AWS_SECRET_ACCESS_KEY:-password}
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8181/v1/config >/dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - fintech_network

  dbt-runner:
    build:
      context: ..
      dockerfile: docker/dbt/Dockerfile
    image: fintech-dbt-runner:1.10.2
    container_name: fintech-dbt-runner
    profiles:
      - dbt
    depends_on:
      trino:
        condition: service_healthy
    working_dir: /workspace/dbt_lakehouse
    environment:
      DEBIAN_FRONTEND: noninteractive
      DBT_TRINO_HOST: trino
      DBT_TRINO_PORT: 8080
      DBT_TRINO_USER: ${TRINO_USER:-admin}
      DBT_THREADS: 1
      TRINO_STATEMENT_URL: http://trino:8080/v1/statement
      TRINO_USER: ${TRINO_USER:-admin}
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    volumes:
      - ..:/workspace
    entrypoint: [ "/bin/sh", "-lc" ]
    command:
        - >
          python ../storage/iceberg_init.py &&
          python -c "
          import urllib.request, json, sys, time
          url = 'http://trino:8080/v1/statement'
          user = 'admin'
          def post(q):
              req = urllib.request.Request(url, data=q.encode(), headers={'X-Trino-User': user, 'Content-Type': 'text/plain'})
              return json.loads(urllib.request.urlopen(req).read())
          print('Waiting for Silver rows...', flush=True)
          while True:
              r = post('SELECT count(*) FROM iceberg.silver.transactions')
              uri = r.get('nextUri')
              while uri:
                  r = json.loads(urllib.request.urlopen(uri).read())
                  uri = r.get('nextUri')
              rows = (r.get('data') or [[0]])[0][0]
              if rows and rows > 0:
                  print(f'Silver ready: {rows} rows', flush=True)
                  break
              print(f'Silver not ready yet ({rows} rows), retrying in 15s...', flush=True)
              time.sleep(15)
          " &&
          dbt debug --profiles-dir . &&
          dbt run --profiles-dir . --select gold &&
          dbt test --profiles-dir . --select gold
    networks:
      - fintech_network

  iceberg-maintenance:
    image: python:3.12-slim
    container_name: fintech-iceberg-maintenance
    profiles:
      - maintenance
    depends_on:
      trino:
        condition: service_healthy
    working_dir: /workspace
    environment:
      TRINO_STATEMENT_URL: http://trino:8080/v1/statement
      TRINO_USER: ${TRINO_USER:-admin}
      ICEBERG_MAINTENANCE_TABLES: iceberg.bronze.transactions,iceberg.silver.transactions,iceberg.gold.gold_hourly_liquidity,iceberg.gold.gold_fraud_alerts
      ICEBERG_MAINTENANCE_FILE_SIZE_THRESHOLD: 64MB
      ICEBERG_MAINTENANCE_RETENTION_THRESHOLD: 7d
      ICEBERG_MAINTENANCE_RETAIN_LAST: 10
      ICEBERG_MAINTENANCE_LOOP: "false"
      ICEBERG_MAINTENANCE_INTERVAL_SECONDS: 21600
    volumes:
      - ..:/workspace
    entrypoint: [ "python", "storage/iceberg_maintenance.py" ]
    networks:
      - fintech_network

  trino:
    image: trinodb/trino:481
    container_name: fintech-trino
    hostname: trino
    depends_on:
      iceberg-rest:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      <<: *aws-env
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8080/v1/info >/dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - fintech_network

networks:
  fintech_network:
    name: fintech_network
    driver: bridge

volumes:
  kafka_data:
  kafka2_data:
  kafka3_data:
  minio_data:
  iceberg_catalog_db:
