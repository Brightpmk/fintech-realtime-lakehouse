name: fintech-realtime-lakehouse

x-aws-env: &aws-env
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-admin}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-password}
  AWS_REGION: ${AWS_REGION:-us-east-1}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}

services:
  kafka:
    image: confluentinc/cp-kafka:8.2.1
    container_name: fintech-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s
    networks:
      - fintech_network

  schema-registry:
    image: confluentinc/cp-schema-registry:8.2.1
    container_name: fintech-schema-registry
    hostname: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
      SCHEMA_REGISTRY_SCHEMA_REGISTRY_INTER_INSTANCE_PROTOCOL: http
      SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL: INFO
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - fintech_network

  flink-checkpoints-init:
    image: alpine:3.20
    container_name: fintech-flink-checkpoints-init
    user: "0:0"
    command: >
      /bin/sh -c "mkdir -p /opt/flink/checkpoints/kafka-to-iceberg &&
      chown -R 9999:9999 /opt/flink/checkpoints"
    volumes:
      - flink_checkpoints:/opt/flink/checkpoints
    networks:
      - fintech_network

  flink-jobmanager:
    build:
      context: .
      dockerfile: flink/Dockerfile
    image: fintech-flink-py:1.20.4
    container_name: fintech-flink-jobmanager
    hostname: flink-jobmanager
    command: jobmanager
    depends_on:
      kafka:
        condition: service_healthy
      flink-checkpoints-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      iceberg-rest:
        condition: service_healthy
    ports:
      - "8082:8081"
    environment:
      <<: *aws-env
      FLINK_CHECKPOINT_DIR: file:///opt/flink/checkpoints/kafka-to-iceberg
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      ICEBERG_REST_URI: http://iceberg-rest:8181
      S3_ENDPOINT: http://minio:9000
      PII_HASH_SALT: ${PII_HASH_SALT:-local-dev-pii-salt-change-me}
      FLINK_PIPELINE_JARS: ${FLINK_PIPELINE_JARS:-}
      FLINK_JARS_DIR: /opt/flink/usrlib
      PYFLINK_CLIENT_EXECUTABLE: python3
      PYFLINK_PYTHON: python3
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.bind-address: 0.0.0.0
        rest.address: flink-jobmanager
        parallelism.default: 2
        state.backend.type: rocksdb
        execution.checkpointing.interval: 30s
        classloader.parent-first-patterns.additional: com.codahale.metrics.
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
    volumes:
      - flink_checkpoints:/opt/flink/checkpoints
      - ../tmp/jars:/opt/flink/usrlib:ro
    networks:
      - fintech_network

  flink-taskmanager:
    build:
      context: .
      dockerfile: flink/Dockerfile
    image: fintech-flink-py:1.20.4
    container_name: fintech-flink-taskmanager
    hostname: flink-taskmanager
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_started
    environment:
      <<: *aws-env
      FLINK_CHECKPOINT_DIR: file:///opt/flink/checkpoints/kafka-to-iceberg
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      ICEBERG_REST_URI: http://iceberg-rest:8181
      S3_ENDPOINT: http://minio:9000
      PII_HASH_SALT: ${PII_HASH_SALT:-local-dev-pii-salt-change-me}
      FLINK_PIPELINE_JARS: ${FLINK_PIPELINE_JARS:-}
      FLINK_JARS_DIR: /opt/flink/usrlib
      PYFLINK_CLIENT_EXECUTABLE: python3
      PYFLINK_PYTHON: python3
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
        classloader.parent-first-patterns.additional: com.codahale.metrics.
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
    volumes:
      - flink_checkpoints:/opt/flink/checkpoints
      - ../tmp/jars:/opt/flink/usrlib:ro
    networks:
      - fintech_network

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: fintech-minio
    hostname: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-admin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-password}
      MINIO_REGION_NAME: ${AWS_REGION:-us-east-1}
      MINIO_DOMAIN: minio
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      fintech_network:
        aliases:
          - warehouse.minio

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: fintech-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      <<: *aws-env
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 $$AWS_ACCESS_KEY_ID $$AWS_SECRET_ACCESS_KEY && mc mb --ignore-existing local/warehouse && mc anonymous set none local/warehouse "
    networks:
      - fintech_network

  iceberg-rest:
    image: apache/iceberg-rest-fixture:1.10.1
    container_name: fintech-iceberg-rest
    hostname: iceberg-rest
    user: "0:0"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8181:8181"
    environment:
      <<: *aws-env
      CATALOG_URI: jdbc:sqlite:/catalog/iceberg_catalog.db?journal_mode=WAL&busy_timeout=60000
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      CATALOG_S3_ACCESS__KEY__ID: ${AWS_ACCESS_KEY_ID:-admin}
      CATALOG_S3_SECRET__ACCESS__KEY: ${AWS_SECRET_ACCESS_KEY:-password}
    volumes:
      - iceberg_catalog:/catalog
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8181/v1/config >/dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - fintech_network

  dbt-runner:
    image: python:3.12-slim
    container_name: fintech-dbt-runner
    profiles:
      - dbt
    depends_on:
      trino:
        condition: service_healthy
    working_dir: /workspace/dbt_lakehouse
    environment:
      DEBIAN_FRONTEND: noninteractive
      DBT_TRINO_HOST: trino
      DBT_TRINO_PORT: 8080
      DBT_TRINO_USER: ${TRINO_USER:-admin}
      DBT_THREADS: 1
      TRINO_STATEMENT_URL: http://trino:8080/v1/statement
      TRINO_USER: ${TRINO_USER:-admin}
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    volumes:
      - ..:/workspace
    entrypoint: [ "/bin/sh", "-lc" ]
    command:
      - >
        apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/* && python -m pip install --no-cache-dir --root-user-action=ignore -r requirements.txt && python ../storage/iceberg_init.py && dbt debug --profiles-dir . && dbt run --profiles-dir . --select gold && dbt test --profiles-dir . --select gold
    networks:
      - fintech_network

  iceberg-maintenance:
    image: python:3.12-slim
    container_name: fintech-iceberg-maintenance
    profiles:
      - maintenance
    depends_on:
      trino:
        condition: service_healthy
    working_dir: /workspace
    environment:
      TRINO_STATEMENT_URL: http://trino:8080/v1/statement
      TRINO_USER: ${TRINO_USER:-admin}
      ICEBERG_MAINTENANCE_TABLES: iceberg.bronze.transactions,iceberg.silver.transactions,iceberg.gold.gold_hourly_liquidity,iceberg.gold.gold_fraud_alerts
      ICEBERG_MAINTENANCE_FILE_SIZE_THRESHOLD: 64MB
      ICEBERG_MAINTENANCE_RETENTION_THRESHOLD: 7d
      ICEBERG_MAINTENANCE_RETAIN_LAST: 10
      ICEBERG_MAINTENANCE_LOOP: "false"
      ICEBERG_MAINTENANCE_INTERVAL_SECONDS: 21600
    volumes:
      - ..:/workspace
    entrypoint: [ "python", "storage/iceberg_maintenance.py" ]
    networks:
      - fintech_network

  trino:
    image: trinodb/trino:481
    container_name: fintech-trino
    hostname: trino
    depends_on:
      iceberg-rest:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      <<: *aws-env
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8080/v1/info >/dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - fintech_network

networks:
  fintech_network:
    name: fintech_network
    driver: bridge

volumes:
  kafka_data:
  minio_data:
  flink_checkpoints:
  iceberg_catalog:
